<html>
<head>
    <title> My website </title>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.0/buzz.min.js"></script>
    <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
        </style>
    </head>
    <body background="img/background.png"
    
    

        <div class="row">
            <div class="image-container"><img id="poweron" src="img/img1.png" height="200" width="200"
                    onmouseover= "this.src='img/img1.2.png';"
                    onmouseout= "this.src='img/img1.png';"
                
                />
            </div>
            <div class="image-container"><img id="systemalert" src="img/img2.2.png" height="200" width="200"
                    onmouseover= "this.src='img/img2.2.png';"
                    onmouseout= "this.src='img/img2.png';"
                
                />
            </div>
            <div class="image-container"><img id="lightsettings" src="img/img3.png" height="200" width="200"
                    onmouseover= "this.src='img/img3.2.png';"
                    onmouseout= "this.src='img/img3.png';"
                />
            </div>
        </div>

        <div class="row">
            <div class="image-container"><img id="securitycameras" src="img/img4.png" height="200" width="200"
                    onmouseover= "this.src='img/img4.2.png';"
                    onmouseout= "this.src='img/img4.png';"
                />
            </div>
            <div class="image-container"><img id="videoon" src="img/img5.png" height="200" width="200"
                    onmouseover= "this.src='img/img5.2.png';"
                    onmouseout= "this.src='img/img5.png';"
                />
            </div>
            <div class="image-container"><img id="visibilityon" src="img/img6.png" height="200" width="200"
                    onmouseover= "this.src='img/img6.2.png';"
                    onmouseout= "this.src='img/img6.png';"
                />
            </div>
            </div>

        <div class="row">
            <div class="image-container"><img id="locationsettings" src="img/img7.png" height="200" width="200"
                    onmouseover= "this.src='img/img7.2.png';"
                    onmouseout= "this.src='img/img7.png';"
                />
            </div>
            <div class="image-container"><img id="lock" src="img/img8.png" height="200" width="200"
                    onmouseover= "this.src='img/img8.2.png';"
                    onmouseout= "this.src='img/img8.png';"
                />
            </div>
            <div class="image-container"><img id="findfriends" src="img/img9.2.png" height="200" width="200"
                    onmouseover= "this.src='img/img9.png';"
                    onmouseout= "this.src='img/img9.2.png';"
                />
            </div>
        </div>
        
        <script>
            var sound1 = new buzz.sound("sound/arming.wav");
            var sound2 = new buzz.sound("sound/alert.wav");
            var sound3 = new buzz.sound("sound/lightsettings.wav");
            var sound4 = new buzz.sound("sound/securitycameras.wav");
            var sound5 = new buzz.sound("sound/videoon.wav");
            var sound6 = new buzz.sound("sound/visibilityon.wav");
            var sound7 = new buzz.sound("sound/locationsettings.wav");
            var sound8 = new buzz.sound("sound/lock.wav");
            var sound9 = new buzz.sound("sound/hey.wav");
     
            window.onload = function() {
                document.getElementById('poweron').addEventListener('mouseover', function () {sound1.play(); });  
                document.getElementById('systemalert').addEventListener('mouseover', function () {sound2.play(); });
                document.getElementById('lightsettings').addEventListener('mouseover', function () {sound3.play(); });
                document.getElementById('securitycameras').addEventListener('mouseover', function () {sound4.play(); });
                document.getElementById('videoon').addEventListener('mouseover', function () {sound5.play(); }); 
                document.getElementById('visibilityon').addEventListener('mouseover', function () {sound6.play(); }); 
                document.getElementById('locationsettings').addEventListener('mouseover', function () {sound7.play(); }); 
                document.getElementById('lock').addEventListener('mouseover', function () {sound8.play(); }); 
                document.getElementById('findfriends').addEventListener('mouseover', function () {sound9.play(); });
            }  
        </script>   
        
    </body>
    

</html>
